---
# ------------------------------------------------------------------------------
# Experiment metadata
# ------------------------------------------------------------------------------
experiment:
  name: experiment_1

# ------------------------------------------------------------------------------
# Resources (memory/threads)
# ------------------------------------------------------------------------------
resources: # Optimised for running 12 samples on m6i.32xlarge (128 cores, 512GB memory)
  memory: # in GB
    light: 16
    moderate: 32
    heavy: 64
  threads:
    light: 4
    moderate: 8
    heavy: 16

# ------------------------------------------------------------------------------
# File paths
# ------------------------------------------------------------------------------
files:
  reference_genome: tmp/downloads/UCSC-GCRh38-p14-filtered.fa # Must be uncompressed (.fa, .fna, .fasta)
  precomputed_masks:
    - "tmp/downloads/GRCh38_alldifficultregions.bed"
    - "tmp/downloads/GRCh38-gnomad-variants-AF-0.01.bed"
    - "tmp/downloads/GCRh38_repeat_masker.bed"
  reference_tri_contexts: tmp/downloads/nanoseq_trinucleotide_contexts.csv
  known_germline_variants: tmp/downloads/gnomad_AF_0.001.vcf.bgz # Must be bgzipped
  ex_samples_metadata: config/ex_samples.csv
  ex_lanes_metadata: config/ex_lanes.csv
  ex_adapters_metadata: config/ex_adapters.csv
  ms_samples_metadata: config/ms_samples.csv
  component_metrics_metadata: config/component_level_metrics.xlsx
  system_metrics_metadata: config/system_level_metrics.xlsx

# ------------------------------------------------------------------------------
# Global parameters
# ------------------------------------------------------------------------------
chroms: # Must be defined with UCSC naming
  included_chromosomes: # Chromosomes included for variant calling
    - "chr1"
    - "chr2"
    - "chr3"
    - "chr4"
    - "chr5"
    - "chr6"
    - "chr7"
    - "chr8"
    - "chr9"
    - "chr10"
    - "chr11"
    - "chr12"
    - "chr13"
    - "chr14"
    - "chr15"
    - "chr16"
    - "chr17"
    - "chr18"
    - "chr19"
    - "chr20"
    - "chr21"
    - "chr22"
    - "chrX"
    - "chrY"

# ------------------------------------------------------------------------------
# Rule parameters
# ------------------------------------------------------------------------------
rules:
  ex_annotate_map:
    min_umi_length: 6

  ex_call_dsc:
    max_duplex_disagreements: 3
    min_read_pairs: 1
    single_strand_qual: 2

  ex_call_somatic_snv:
    max_base_quality: 150
    min_base_quality: 70

  ex_extract_fastq_umis:
    umi_length: 3

  ex_filter_dsc:
    min_mapq: 50

  ex_filter_fastq:
    min_read_length: 80
    average_quality_threshold: 30

  ex_map:
    band_width: 100
    gap_extension_penalty: 1
    clipping_penalty: 5
    gap_open_penalty: 6
    matching_score: 1
    mem_max_occurances: 10000
    min_alignment_score_thresh: 30
    min_seed_length: 19
    mismatch_penalty: 4
    reseed_factor: 1.5
    unpaired_read_penalty: 9
    z_dropoff: 100

  ex_remap_dsc:
    band_width: 100
    gap_extension_penalty: 1
    clipping_penalty: 5
    gap_open_penalty: 6
    matching_score: 1
    mem_max_occurances: 10000
    min_alignment_score_thresh: 30
    min_seed_length: 19
    mismatch_penalty: 4
    reseed_factor: 1.5
    unpaired_read_penalty: 9
    z_dropoff: 100

  ex_trim_fastq:
    max_adapter_errors: 2
    min_adapter_overlap: 8
    r1_cut_start: 3
    r2_cut_start: 3
    r1_cut_end: -9  # Must be negative
    r2_cut_end: -9  # Must be negative
    quality_cutoff: 20

  ms_candidate_germ_variants:
    base_quality_score_threshold: 18
    heterozygosity_rate: 0.001
    heterozygosity_stdev: 0.01
    indel_heterozygosity: 1.25e-4
    min_base_quality_score: 10
    max_alternate_alleles: 6
    standard_min_confidence_threshold: 20 # Default is 30

  ms_filter_fastq:
    min_read_length: 100

  ms_low_depth_mask:
    threshold: 40

  ms_map:
    band_width: 100
    gap_extension_penalty: 1
    clipping_penalty: 5
    gap_open_penalty: 6
    matching_score: 1
    mem_max_occurances: 10000
    min_alignment_score_thresh: 30
    min_seed_length: 19
    mismatch_penalty: 4
    reseed_factor: 1.5
    unpaired_read_penalty: 9
    z_dropoff: 100

  ms_remove_duplicates:
    duplicate_decision_method: t # Measures positions based on template start/end
    optical_duplicate_distance: 2500

  ms_trim_fastq:
    adaptor_1: AGATCGGAAGAGCACACGTCTGAACTCCAGTCA
    adaptor_2: AGATCGGAAGAGCGTCGTGTAGGGAAAGAGTGT
    max_error_rate: 0.1
    min_overlap: 3
    spacer_length: 3
    qual_trim_threshold: 20 # Trims low quality bases from 3' end of read
