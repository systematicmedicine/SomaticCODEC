# ------------------------------------------------------------------------------
# Development configuration
#
# To be used in conjunction with config.yaml.
# These values override defaults for use in a development environment
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# Run name
# ------------------------------------------------------------------------------
run_name: lightweight_test_run

# ------------------------------------------------------------------------------
# Metadata paths
# ------------------------------------------------------------------------------
metadata:

  ex_samples_metadata: tests/data/lightweight_test_run/config/ex_samples.csv
  ex_lanes_metadata: tests/data/lightweight_test_run/config/ex_lanes.csv
  ex_adapters_metadata: tests/data/lightweight_test_run/config/ex_adapters.csv
  ms_samples_metadata: tests/data/lightweight_test_run/config/ms_samples.csv
  component_metrics_metadata: config/component_level_metrics.xlsx
  system_metrics_metadata: config/system_level_metrics.xlsx
  download_list: tests/data/lightweight_test_run/config/download_list.csv

# ------------------------------------------------------------------------------
# Scientific parameters
# ------------------------------------------------------------------------------
sci_params:
  shared:
    reference_genome: tmp/downloads/GRCh38_Chr21_plus_stubs.fa
    reference_tri_contexts: tmp/downloads/2025-09-30_trinucleotide_contexts.csv
    reference_genome_trinuc_counts: tmp/downloads/UCSC-GRCh38-p14-filtered-trinucleotide-counts.csv
    known_germline_variants: tmp/downloads/gnomad-chr21-micro.vcf.bgz
    precomputed_masks:
      - tmp/downloads/GRCh38_alldifficultregions_10lines.bed
      - tmp/downloads/GRCh38-gnomad-variants-AF-0.01_10lines.bed
      - tmp/downloads/GRCh38_repeat_masker_10lines.bed

  ms_pileup:
    min_depth: 1

# ------------------------------------------------------------------------------
# Infrastructure
# ------------------------------------------------------------------------------
infrastructure:
  memory:
    extra_heavy: 6
    heavy: 6
    moderate: 4
    light: 2

  threads:
    heavy: 2
    moderate: 2
    light: 1

  compression:
    gzip_level: 1