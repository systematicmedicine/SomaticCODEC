# ------------------------------------------------------------------------------
# Development configuration
#
# To be used in conjunction with config.yaml.
# These values override defaults for use in a development environment
# ------------------------------------------------------------------------------

run_name: lightweight_test_run

sci_params:
  global:
    reference_genome: tmp/downloads/GRCh38_Chr21_plus_stubs.fa

    precomputed_masks:
      - tmp/downloads/GRCh38_alldifficultregions_10lines.bed
      - tmp/downloads/GRCh38-gnomad-variants-AF-0.01_10lines.bed
      - tmp/downloads/GCRh38_repeat_masker_10lines.bed

    known_germline_variants: tmp/downloads/gnomad-chr21-micro.vcf.bgz

  ms_low_depth_mask:
    min_depth: 1

infrastructure:
  memory:
    extra_heavy: 6
    heavy: 6
    moderate: 4
    light: 2

  threads:
    heavy: 2
    moderate: 2
    light: 1

  compression:
    gzip_level: 1