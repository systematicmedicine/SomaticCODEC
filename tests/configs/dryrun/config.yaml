---
# Experiment name
experiment_name: dryrun

# Rule parameters
ex_filter_fastq:
  min_read_length: 70
  average_quality_threshold: 34
  n_base_limit: 3

ms_candidate_germ_variants:
  memory_limit_gb: 4

ms_low_depth_mask:
  threshold: 1

ms_trim_fastq:
  adaptor_1: CTGTCTCTTATACACATCT
  adaptor_2: ATGTGTATAAGAGACA

# File paths
GRCh38_path: tests/data/dryrun/GRCh38_Chr21.fna
difficult_regions_path: tests/data/dryrun/GRCh38_alldifficultregions_10lines.bed
common_variants_path: tests/data/dryrun/gnomad_common_af01_merged_10lines.bed
ex_nanoseq_tri_contexts: tests/data/dryrun/nanoseq_trinucleotide_contexts.csv
ex_samples_path: tests/configs/dryrun/ex_samples.csv
ex_lanes_path: tests/configs/dryrun/ex_lanes.csv
ex_adapters_path: tests/configs/dryrun/ex_adapters.csv
ms_samples_path: tests/configs/dryrun/ms_samples.csv
component_metrics_path: config/component_metrics.csv